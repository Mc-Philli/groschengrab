{{define "login.html"}}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Anmelden – Haushalts-App</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-page">
    <section class="card auth-card">
        <h1>🏠 Anmelden</h1>
        {{if .ErrorMsg}}
        <div class="banner banner-error">⚠️ {{.ErrorMsg}}</div>
        {{end}}
        <form method="POST" action="/login" class="form-grid">
            <label>Name<br>
                <input type="text" name="name" required autofocus>
            </label>
            <label>Passwort<br>
                <input type="password" name="password" required>
            </label>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="width:100%">Anmelden</button>
            </div>
        </form>
        <p class="auth-switch">Noch kein Konto? <a href="/register">Registrieren</a></p>
    </section>
</body>
</html>
{{end}}
