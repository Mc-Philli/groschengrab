{{define "nav"}}
<header class="app-header">
    <div class="header-inner">
        <h1>🏠 Haushalts-App</h1>
        <nav>
            <a href="/" class="{{if eq .Page "home"}}active{{end}}">Start</a>
            <a href="/depot" class="{{if eq .Page "depot"}}active{{end}}">Depot</a>
            <a href="/settings" class="{{if eq .Page "settings"}}active{{end}}">Einstellungen</a>
        </nav>
        <div class="user-info">
            <span>👤 {{.CurrentUserName}}</span>
            <form method="POST" action="/logout">
                <button type="submit" class="btn-link">Abmelden</button>
            </form>
        </div>
    </div>
</header>
{{end}}
